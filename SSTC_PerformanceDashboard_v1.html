<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SST&C Performance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+TC:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --paper:#fffdf7;--cream:#faf6e9;--cream2:#f5efd9;--gold:#b3902c;--gold2:#d6bd6c;
  --ink:#2a2418;--muted:#6b5a36;--line:#d9be69;--dark:#28251f;--ok:#3c7a35;--bad:#b64b35;
  --shadow:0 10px 28px rgba(64,45,8,.08);--font-display:'Cinzel',serif;--font-body:'Noto Serif TC',serif;
}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:14px}
.topbar{position:sticky;top:0;z-index:20;background:rgba(255,253,247,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
.top-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;max-width:1240px;margin:auto;padding:18px 22px}
.brand{display:flex;align-items:center;gap:14px}.brand-mark{font-family:var(--font-display);letter-spacing:5px;color:var(--gold);font-weight:600;border:1px solid var(--line);padding:5px 14px;text-decoration:none;display:inline-flex;align-items:center;min-height:34px}
.brand-mark:hover{background:var(--cream2)}
.brand-title{font-weight:700;font-size:18px}.brand-sub{font-size:12px;color:var(--muted);margin-top:2px}.top-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.btn,.select,.input{height:34px;border:1px solid var(--line);background:#fffefa;color:var(--ink);font-family:var(--font-body);padding:0 10px}
.btn{cursor:pointer;font-family:var(--font-display);font-size:10px;letter-spacing:1.5px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none}.btn.gold{background:var(--gold);color:white}.btn:hover{background:var(--cream2)}
.wrap{max-width:1240px;margin:auto;padding:22px}.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.tab{border:1px solid var(--line);background:#fffefa;padding:10px 16px;font-family:var(--font-display);font-size:10px;letter-spacing:2px;cursor:pointer;color:var(--muted)}
.tab.active{background:var(--gold);color:white}.panel{display:none}.panel.active{display:block}
.hero{display:flex;align-items:end;justify-content:space-between;gap:16px;background:linear-gradient(90deg,#fff7c7,#f3df7e);border:1px solid var(--line);padding:20px 24px;margin-bottom:20px}
.hero h1{margin:0 0 4px;font-size:24px}.hero p{margin:0;color:var(--muted)}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:22px}.kpi{background:#fffefa;border:1px solid var(--line);padding:12px;text-align:center;box-shadow:var(--shadow)}
.kpi .label{color:var(--muted);font-size:12px}.kpi .value{font-size:24px;margin:4px 0}.kpi .delta{font-size:11px;color:var(--bad)}.kpi .delta.good{color:var(--ok)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px}.card{background:#fffefa;border:1px solid var(--line);border-radius:8px;padding:16px;box-shadow:var(--shadow);min-width:0}
.card.wide{grid-column:1/-1}.card h2{font-size:16px;margin:0 0 12px;color:var(--muted)}.chart-box{height:310px}.chart-box.sm{height:250px}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px}.table{width:100%;border-collapse:collapse;font-size:12px;background:#fff}.table th{background:var(--dark);color:white;position:sticky;top:0;z-index:1}
.table th,.table td{padding:7px 8px;border-bottom:1px solid #ead99b;text-align:right;white-space:nowrap}.table th:first-child,.table td:first-child{text-align:left}.table tr:nth-child(even){background:#fbf6e7}
.note{font-size:12px;color:var(--muted);line-height:1.7;margin-top:8px}.ai-box{display:grid;grid-template-columns:320px 1fr;gap:16px}.ai-side{background:var(--cream);border:1px solid var(--line);padding:14px}
.ai-out{min-height:240px;background:#fffefa;border:1px solid var(--line);padding:16px;line-height:1.8;white-space:pre-wrap}.pill-list{display:flex;flex-wrap:wrap;gap:6px}.pill{background:var(--cream2);border:1px solid var(--line);padding:4px 8px;font-size:12px}
.funnel{display:grid;grid-template-columns:1fr 40px 1fr 40px 1fr;align-items:center;gap:12px;background:#fff3bd;border:1px solid var(--line);padding:18px}.funnel-step{background:#fffefa;border:1px solid var(--gold);text-align:center;padding:12px}.arrow{font-size:28px;color:var(--gold);text-align:center}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.grid,.ai-box{grid-template-columns:1fr}.hero{display:block}.top-inner{align-items:start;flex-direction:column}.chart-box{height:260px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="top-inner">
    <div class="brand">
      <a class="brand-mark" href="SSTC_v46.html" title="回主系統">SST&amp;C</a>
      <div>
        <div class="brand-title">數據戰情室</div>
        <div class="brand-sub">Marketing Performance Dashboard</div>
      </div>
    </div>
    <div class="top-actions">
      <select id="brandFilter" class="select" onchange="renderAll()"><option value="all">全部品牌</option><option>SST&amp;C</option><option>ARVOpm</option></select>
      <select id="sourceFilter" class="select" onchange="renderAll()"><option value="all">全部來源</option></select>
      <input id="aiEndpoint" class="input" placeholder="AI 服務網址 GAS" style="width:250px">
      <button class="btn" onclick="saveAIEndpoint()">儲存 AI</button>
      <button class="btn" onclick="openDataSourceModal()">資料來源</button>
      <button class="btn" onclick="clearDataSources()">清除來源</button>
      <a class="btn" href="SSTC_v46.html" style="text-decoration:none">回主系統</a>
    </div>
  </div>
</div>
<main class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="showPanel('ga4',this)">GA4 總覽</button>
    <button class="tab" onclick="showPanel('app91',this)">91APP</button>
    <button class="tab" onclick="showPanel('hodo',this)">禾多廣告</button>
    <button class="tab" onclick="showPanel('line',this)">LINE / 漸強</button>
    <button class="tab" onclick="showPanel('fb',this)">FB 社群</button>
    <button class="tab" onclick="showPanel('ai',this)">AI 數據分析</button>
  </div>
  <section id="panel-ga4" class="panel active"></section>
  <section id="panel-app91" class="panel"></section>
  <section id="panel-hodo" class="panel"></section>
  <section id="panel-line" class="panel"></section>
  <section id="panel-fb" class="panel"></section>
  <section id="panel-ai" class="panel"></section>
</main>
<div id="dataSourceModal" style="display:none;position:fixed;inset:0;background:rgba(28,20,8,.38);z-index:50;align-items:center;justify-content:center;padding:24px">
  <div style="background:var(--paper);border:1px solid var(--line);max-width:720px;width:100%;padding:20px;box-shadow:var(--shadow)">
    <h2 style="margin:0 0 12px">資料來源設定</h2>
    <p class="note">貼上 Google Sheet GAS Web app URL 後，儀表板會優先讀線上 Sheet；空白時使用 GitHub 內建 JSON 備份。</p>
    <div style="display:grid;gap:10px;margin:14px 0">
      <label>整理後成效表 GAS URL</label>
      <input id="perfSheetEndpoint" class="input" style="width:100%" placeholder="https://script.google.com/macros/s/.../exec">
      <label>禾多原始周報 GAS URL</label>
      <input id="hodoSheetEndpoint" class="input" style="width:100%" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeDataSourceModal()">取消</button>
      <button class="btn gold" onclick="saveDataSources()">儲存並重新載入</button>
    </div>
  </div>
</div>
<script>
const DATA_URL='data/performance-data.json';
let raw=null, charts={};
const fmtMoney=n=>'$'+Math.round(num(n)).toLocaleString('en-US');
const fmtInt=n=>Math.round(num(n)).toLocaleString('en-US');
const fmtPct=n=>(num(n)*100).toFixed(2)+'%';
const num=v=>{if(v===null||v===undefined||v===''||String(v).includes('#DIV'))return 0;const n=Number(v);return isNaN(n)?0:n};
function excelDate(v){const n=num(v);if(!n)return '';const d=new Date(Math.round((n-25569)*86400*1000));return d.toISOString().slice(0,10)}
function sheet(name){return (raw&&raw.sheets&&raw.sheets[name])||[]}
function byBrand(rows){const b=document.getElementById('brandFilter').value;return b==='all'?rows:rows.filter(r=>(r['品牌']||'')===b)}
function bySource(rows,key){const s=document.getElementById('sourceFilter').value;return s==='all'?rows:rows.filter(r=>String(r[key]||'').toLowerCase()===s.toLowerCase())}
function sum(rows,key){return rows.reduce((a,r)=>a+num(r[key]),0)}
function avg(rows,key){const vals=rows.map(r=>num(r[key])).filter(Boolean);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0}
function group(rows,key,metrics){const m=new Map();rows.forEach(r=>{const k=r[key]||'其他';if(!m.has(k))m.set(k,{name:k,rows:0});const o=m.get(k);o.rows++;metrics.forEach(x=>o[x]=(o[x]||0)+num(r[x]));});return [...m.values()]}
function destroy(id){if(charts[id]){charts[id].destroy();delete charts[id]}}
function chart(id,type,labels,datasets,opts={}){destroy(id);charts[id]=new Chart(document.getElementById(id),{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},...opts}})}
function kpis(items){return `<div class="kpis">${items.map(i=>`<div class="kpi"><div class="label">${i.label}</div><div class="value">${i.value}</div><div class="delta ${i.good?'good':''}">${i.delta||''}</div></div>`).join('')}</div>`}
function table(rows,cols,limit=10){return `<div class="table-wrap"><table class="table"><thead><tr>${cols.map(c=>`<th>${c[0]}</th>`).join('')}</tr></thead><tbody>${rows.slice(0,limit).map(r=>`<tr>${cols.map(c=>`<td>${c[2]?c[2](r[c[1]],r):r[c[1]]}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function showPanel(id,btn){window.currentPanelId=id;document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById('panel-'+id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');setTimeout(renderAll,30)}
function saveAIEndpoint(){localStorage.setItem('sstc_ai_endpoint',document.getElementById('aiEndpoint').value.trim());alert('AI 服務網址已儲存')}
function getAIEndpoint(){return (localStorage.getItem('sstc_ai_endpoint')||'').trim()}
function getDataSource(key){return (localStorage.getItem(key)||'').trim()}
function openDataSourceModal(){
  document.getElementById('perfSheetEndpoint').value=getDataSource('sstc_perf_sheet_endpoint');
  document.getElementById('hodoSheetEndpoint').value=getDataSource('sstc_hodo_sheet_endpoint');
  document.getElementById('dataSourceModal').style.display='flex';
}
function closeDataSourceModal(){document.getElementById('dataSourceModal').style.display='none'}
function saveDataSources(){
  localStorage.setItem('sstc_perf_sheet_endpoint',document.getElementById('perfSheetEndpoint').value.trim());
  localStorage.setItem('sstc_hodo_sheet_endpoint',document.getElementById('hodoSheetEndpoint').value.trim());
  closeDataSourceModal();
  init();
}
function renderSourceDiagnostics(message=''){
  const sheets=raw&&raw.sheets?Object.keys(raw.sheets):[];
  const hodoSheets=hodoVendorRaw&&hodoVendorRaw.sheets?Object.keys(hodoVendorRaw.sheets):[];
  const rows=sheets.map(name=>({name,rows:(raw.sheets[name]||[]).length,cols:Object.keys((raw.sheets[name]||[])[0]||{}).slice(0,8).join(' / ')}));
  const hRows=hodoSheets.map(name=>({name,rows:(hodoVendorRaw.sheets[name]||[]).length,cols:Object.keys((hodoVendorRaw.sheets[name]||[])[0]||{}).slice(0,8).join(' / ')}));
  document.getElementById('panel-ai').innerHTML=`
    <div class="hero"><div><h1>資料來源診斷</h1><p>確認 Google Sheet 回傳的工作表與欄位</p></div></div>
    ${message?`<div class="card wide"><h2>目前狀態</h2><pre class="ai-out">${esc(message)}</pre></div>`:''}
    <div class="card wide"><h2>整理後成效表</h2>${table(rows,[['工作表','name'],['資料列','rows',fmtInt],['前幾個欄位','cols']],50)}</div>
    <div class="card wide"><h2>禾多原始周報</h2>${table(hRows,[['工作表','name'],['資料列','rows',fmtInt],['前幾個欄位','cols']],50)}</div>`;
}
function clearDataSources(){
  localStorage.removeItem('sstc_perf_sheet_endpoint');
  localStorage.removeItem('sstc_hodo_sheet_endpoint');
  alert('資料來源已清除，將改用 GitHub JSON 備份資料');
  init();
}
function loadJsonp(url){
  return new Promise((resolve,reject)=>{
    if(!url){reject(new Error('missing url'));return}
    const cb='sstcSheet_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const script=document.createElement('script');
    const timer=setTimeout(()=>{cleanup();reject(new Error('Sheet API timeout'))},60000);
    function cleanup(){clearTimeout(timer);delete window[cb];if(script.parentNode)script.parentNode.removeChild(script)}
    window[cb]=data=>{cleanup();resolve(data)};
    script.onerror=()=>{cleanup();reject(new Error('Sheet API load failed'))};
    script.src=url+(url.includes('?')?'&':'?')+'callback='+encodeURIComponent(cb);
    document.head.appendChild(script);
  });
}

async function init(){
  document.getElementById('aiEndpoint').value=getAIEndpoint();
  const perfEndpoint=getDataSource('sstc_perf_sheet_endpoint');
  raw=perfEndpoint?await loadJsonp(perfEndpoint).catch(()=>fetch(DATA_URL).then(r=>r.json())):await fetch(DATA_URL).then(r=>r.json());
  const sources=[...new Set(sheet('91APP｜綜合數據').map(r=>r['來源/媒介']).filter(Boolean))].slice(0,80);
  document.getElementById('sourceFilter').innerHTML='<option value="all">全部來源</option>'+sources.map(s=>`<option>${s}</option>`).join('');
  renderAll();
}
function renderAll(){
  if(!raw)return;
  const tasks=[['ga4',renderGA4],['app91',render91],['hodo',renderHodo],['line',renderLine],['fb',renderFB],['ai',renderAI]];
  const errors=[];
  tasks.forEach(([id,fn])=>{
    try{fn()}catch(e){
      errors.push(id+': '+e.message);
      const panel=document.getElementById('panel-'+id);
      if(panel)panel.innerHTML=`<div class="hero"><div><h1>${id.toUpperCase()} 資料未對上</h1><p>這一頁需要欄位對照後才能顯示</p></div></div><div class="card wide"><h2>原因</h2><pre class="ai-out">${esc(e.message)}</pre></div>`;
    }
  });
  if(errors.length)renderSourceDiagnostics(errors.join('\n'));
}
function renderGA4(){
  const rows=bySource(sheet('91APP｜綜合數據'),'來源/媒介');
  const ref=byBrand(sheet('統一成效表'));
  const src=group(rows,'來源/媒介',['工作階段數','線上訂單數 (TG)','線上訂單金額 (TG)','OMO總營收','不重複訪客數']).sort((a,b)=>b['工作階段數']-a['工作階段數']);
  document.getElementById('panel-ga4').innerHTML=`
    <div class="hero"><div><h1>SST&amp;C GA4 數據戰情室</h1><p>流量、訂單、營收與來源品質總覽</p></div><div class="note">資料列數 ${fmtInt(rows.length)}</div></div>
    ${kpis([
      {label:'總營收',value:fmtMoney(sum(rows,'OMO總營收')),delta:'OMO + online'},
      {label:'線上訂單金額',value:fmtMoney(sum(rows,'線上訂單金額 (TG)')),delta:'TG revenue'},
      {label:'線上訂單數',value:fmtInt(sum(rows,'線上訂單數 (TG)')),delta:'orders'},
      {label:'工作階段',value:fmtInt(sum(rows,'工作階段數')),delta:'sessions'},
      {label:'不重複訪客',value:fmtInt(sum(rows,'不重複訪客數')),delta:'users'},
      {label:'廣告 ROAS',value:avg(ref,'ROAS').toFixed(2),delta:'ad avg'}
    ])}
    <div class="grid">
      <div class="card wide"><h2>流量來源成效排行</h2>${table(src,[['來源/媒介','name'],['工作階段','工作階段數',fmtInt],['訂單','線上訂單數 (TG)',fmtInt],['營收','線上訂單金額 (TG)',fmtMoney],['OMO 營收','OMO總營收',fmtMoney]],12)}<div class="note">可用來判斷自然流量、付費流量、LINE/Push、EDM 等來源的量與轉換品質。</div></div>
      <div class="card"><h2>各來源流量占比</h2><div class="chart-box sm"><canvas id="ga4Pie"></canvas></div></div>
      <div class="card"><h2>各來源營收比較</h2><div class="chart-box sm"><canvas id="ga4Bar"></canvas></div></div>
      <div class="card wide"><h2>線上轉換流程指標</h2><div class="funnel"><div class="funnel-step"><b>工作階段</b><br>${fmtInt(sum(rows,'工作階段數'))}</div><div class="arrow">→</div><div class="funnel-step"><b>線上訂單</b><br>${fmtInt(sum(rows,'線上訂單數 (TG)'))}</div><div class="arrow">→</div><div class="funnel-step"><b>線上訂單金額</b><br>${fmtMoney(sum(rows,'線上訂單金額 (TG)'))}</div></div></div>
    </div>`;
  chart('ga4Pie','doughnut',src.slice(0,9).map(x=>x.name),[{data:src.slice(0,9).map(x=>x['工作階段數']),backgroundColor:palette()}]);
  chart('ga4Bar','bar',src.slice(0,10).map(x=>x.name),[{label:'OMO 營收',data:src.slice(0,10).map(x=>x['OMO總營收']),backgroundColor:'#b3902c'}]);
}
function render91(){
  const rows=bySource(sheet('91APP｜綜合數據'),'來源/媒介');
  const byWeek=group(rows,'時間/週次',['工作階段數','線上訂單金額 (TG)','線上訂單數 (TG)','不重複訪客數']).sort((a,b)=>Number(a.name)-Number(b.name));
  const bySrc=group(rows,'來源/媒介',['工作階段數','線上訂單金額 (TG)','OMO總營收']).sort((a,b)=>b['OMO總營收']-a['OMO總營收']);
  document.getElementById('panel-app91').innerHTML=`
    <div class="hero"><div><h1>SST&amp;C 91APP 數據戰情室</h1><p>站內流量、訂單、OMO 營收與來源貢獻</p></div></div>
    ${kpis([{label:'OMO 總營收',value:fmtMoney(sum(rows,'OMO總營收'))},{label:'線上訂單金額',value:fmtMoney(sum(rows,'線上訂單金額 (TG)'))},{label:'線上訂單數',value:fmtInt(sum(rows,'線上訂單數 (TG)'))},{label:'工作階段',value:fmtInt(sum(rows,'工作階段數'))},{label:'不重複訪客',value:fmtInt(sum(rows,'不重複訪客數'))},{label:'轉換率',value:(sum(rows,'線上訂單數 (TG)')/Math.max(sum(rows,'工作階段數'),1)*100).toFixed(2)+'%'}])}
    <div class="grid">
      <div class="card"><h2>營收趨勢圖（週次）</h2><div class="chart-box"><canvas id="appRev"></canvas></div></div>
      <div class="card"><h2>流量趨勢圖（週次）</h2><div class="chart-box"><canvas id="appTraffic"></canvas></div></div>
      <div class="card"><h2>各來源流量占比</h2><div class="chart-box sm"><canvas id="appPie"></canvas></div></div>
      <div class="card"><h2>各來源營收比較</h2><div class="chart-box sm"><canvas id="appSrc"></canvas></div></div>
    </div>`;
  chart('appRev','line',byWeek.map(x=>'W'+x.name),[{label:'OMO 營收',data:byWeek.map(x=>x['OMO總營收']),borderColor:'#b3902c',backgroundColor:'#d6bd6c'}]);
  chart('appTraffic','line',byWeek.map(x=>'W'+x.name),[{label:'工作階段',data:byWeek.map(x=>x['工作階段數']),borderColor:'#b3902c'},{label:'不重複訪客',data:byWeek.map(x=>x['不重複訪客數']),borderColor:'#333'}]);
  chart('appPie','doughnut',bySrc.slice(0,9).map(x=>x.name),[{data:bySrc.slice(0,9).map(x=>x['工作階段數']),backgroundColor:palette()}]);
  chart('appSrc','bar',bySrc.slice(0,10).map(x=>x.name),[{label:'OMO 營收',data:bySrc.slice(0,10).map(x=>x['OMO總營收']),backgroundColor:'#b3902c'}]);
}
function renderHodo(){
  const rows=byBrand(sheet('統一成效表'));
  const ads=rows.filter(r=>String(r['平台']||'').toLowerCase().includes('meta')||String(r['平台']||'').toLowerCase().includes('google')||String(r['平台']||'').toLowerCase().includes('hodo'));
  const src=group(ads,'廣告名稱',['曝光次數','點擊次數','花費','購買金額','購買次數']).map(x=>({...x,ROAS:x['購買金額']/Math.max(x['花費'],1),CTR:x['點擊次數']/Math.max(x['曝光次數'],1),CPC:x['花費']/Math.max(x['點擊次數'],1)})).sort((a,b)=>b.ROAS-a.ROAS);
  document.getElementById('panel-hodo').innerHTML=`

function readSheet(name){return (raw&&raw.sheets&&raw.sheets[name])||[]}
function getVal(row,...keys){for(const k of keys){if(row&&row[k]!==undefined&&row[k]!==null&&row[k]!=='')return row[k]}return ''}
function toNum(v){if(v===null||v===undefined||v===''||String(v).includes('#DIV'))return 0;const n=Number(String(v).replace(/[$,%]/g,'').trim());return isNaN(n)?0:n}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function inferBrand(text){text=String(text||'');if(/arvo/i.test(text))return 'ARVOpm';if(/sst|天喜|st&c/i.test(text))return 'SST&C';return 'Unknown'}
function inferPlatform(row){
  const text=[getVal(row,'平台'),getVal(row,'廣告名稱'),getVal(row,'素材名稱'),getVal(row,'受眾名稱')].join(' ').toLowerCase();
  if(/google|pmax|gdn|search/.test(text))return 'Google';
  if(/meta|facebook|fb|目錄型|成效型|曝光廣告/.test(text))return 'Meta';
  if(/hodo|禾多|推播|聯播/.test(text))return 'Hodo';
  return 'Unknown';
}
function inferAdType(row){
  const text=[getVal(row,'廣告類型'),getVal(row,'廣告名稱'),getVal(row,'素材名稱'),getVal(row,'受眾名稱')].join(' ');
  if(/目錄型|商品資料夾|catalog/i.test(text))return '目錄型廣告';
  if(/成效型|導購|conversion/i.test(text))return '成效型廣告';
  if(/曝光|流量|reach|traffic/i.test(text))return '曝光/流量';
  if(/pmax/i.test(text))return 'PMAX';
  if(/受眾/.test(text))return '受眾分析';
  if(/素材/.test(text))return '素材分析';
  return getVal(row,'廣告類型')||'未分類';
}
function qualityTags(row){
  const tags=[];
  if(inferPlatform(row)==='Unknown')tags.push('Unknown Platform');
  if(inferBrand([getVal(row,'品牌'),getVal(row,'廣告名稱')].join(' '))==='Unknown')tags.push('Unknown Brand');
  if(!getVal(row,'廣告名稱')&&!getVal(row,'受眾名稱')&&!getVal(row,'素材名稱'))tags.push('Missing Name');
  if(!getVal(row,'日期範圍'))tags.push('Missing Date Range');
  if(String(getVal(row,'廣告名稱')).includes('總計'))tags.push('Total Row');
  return tags.length?tags:['Clean'];
}
function cleanHodoRows(){
  const brandFilter=document.getElementById('brandFilter')?.value||'all';
  return readSheet('統一成效表').map(r=>{
    const name=getVal(r,'廣告名稱')||getVal(r,'受眾名稱')||getVal(r,'素材名稱')||'未命名';
    const clean={raw:r,name,brand:getVal(r,'品牌')||inferBrand(name),platform:inferPlatform(r),adType:inferAdType(r),dateRange:getVal(r,'日期範圍'),impressions:toNum(getVal(r,'曝光次數')),clicks:toNum(getVal(r,'點擊次數')),spend:toNum(getVal(r,'花費','花費 TWD')),revenue:toNum(getVal(r,'購買金額','購買金額 TWD')),orders:toNum(getVal(r,'購買次數')),cart:toNum(getVal(r,'加入購物車')),audience:getVal(r,'受眾名稱'),creative:getVal(r,'素材名稱')};
    clean.ctr=clean.clicks/Math.max(clean.impressions,1);clean.cpc=clean.spend/Math.max(clean.clicks,1);clean.roas=clean.revenue/Math.max(clean.spend,1);clean.tags=qualityTags(r);return clean;
  }).filter(r=>brandFilter==='all'||r.brand===brandFilter).filter(r=>r.platform!=='Unknown'||r.impressions||r.clicks||r.spend||r.revenue);
}
function parseVendorSummary(){
  const source=(hodoVendorRaw&&hodoVendorRaw.sheets)||{};
  let sheetList=[];
  if(Array.isArray(source)){
    sheetList=source;
  }else if(source&&typeof source==='object'){
    sheetList=Object.keys(source).map(name=>({name,rows:source[name]}));
  }
  const summaries=[];
  sheetList.forEach(s=>{
    if(!s||!s.rows)return;
    const brand=inferBrand(s.name);
    const period=(s.name.match(/_(.+)$/)||[])[1]||'';
    let section='Unknown';
    let dataRows=0,totalRows=0,notes=0;
    s.rows.forEach(row=>{
      const cells=Array.isArray(row)?row:Object.values(row||{});
      const first=String(cells[0]||'').trim();
      const joined=cells.map(x=>String(x||'')).join(' ');
      if(/META|Meta|FB/.test(first))section='Meta';
      if(/GOOGLE|Google|PMAX/.test(first))section='Google';
      if(first==='總計')totalRows++;
      if(/偏高|不足|扣除|平均ROAS/.test(joined))notes++;
      if(/廣告|活動|受眾|目錄|成效|曝光/.test(first)&&first!=='活動名稱'&&first!=='受眾名稱')dataRows++;
    });
    summaries.push({sheet:s.name,brand,period,section,dataRows,totalRows,notes,rows:s.rows.length});
  });
  return summaries;
}
function hodoGlobalContext(rows){
  const totalSpend=rows.reduce((a,r)=>a+r.spend,0),totalRevenue=rows.reduce((a,r)=>a+r.revenue,0);
  const byPlatform=groupClean(rows,'platform',['spend','revenue']).map(x=>({name:x.name,spend:Math.round(x.spend),revenue:Math.round(x.revenue),roas:Number((x.revenue/Math.max(x.spend,1)).toFixed(2))})).slice(0,4);
  const top=rows.filter(r=>r.spend>0).sort((a,b)=>b.roas-a.roas).slice(0,3).map(r=>({name:shortText(r.name,28),platform:r.platform,spend:Math.round(r.spend),revenue:Math.round(r.revenue),roas:Number(r.roas.toFixed(2))}));
  return {source:'Hodo vendor report + manually normalized Excel',totalRows:rows.length,totalSpend,totalRevenue,roas:totalRevenue/Math.max(totalSpend,1),byPlatform,top};
}
function shortText(value,len=50){const text=String(value||'');return text.length>len?text.slice(0,len)+'...':text}
function compactHodoContext(ctx){return {totalRows:ctx.totalRows,totalSpend:Math.round(ctx.totalSpend),totalRevenue:Math.round(ctx.totalRevenue),roas:Number(ctx.roas.toFixed(2)),byPlatform:ctx.byPlatform,top:ctx.top}}
function compactHodoSection(scope,data){

function groupClean(rows,key,metrics){
  const m=new Map();rows.forEach(r=>{const k=r[key]||'其他';if(!m.has(k))m.set(k,{name:k,rows:0});const o=m.get(k);o.rows++;metrics.forEach(x=>o[x]=(o[x]||0)+(r[x]||0));});return [...m.values()];
}

    if(!endpoint){sectionAIState[cacheKey]=localHodoInsight(scope,context,sectionData);out.textContent=sectionAIState[cacheKey];return}
    const res=await callJsonp(endpoint,{mode:'analytics',section:'hodo-'+scope,metrics:{global:compactHodoContext(context),sectionData:compactHodoSection(scope,sectionData)},instruction:'Analyze the selected Hodo dashboard section. Use the global Hodo context first, then explain this specific section. Write Traditional Chinese with concrete action suggestions.'});
    if(res.options){
      out.textContent='目前這個 AI 服務網址還是「文案生成」版本，尚未更新成「數據分析」版本。\n\n請到 AI Proxy GAS 貼上新版 openai-proxy-simple.gs 並重新部署新版本。';
      return;
    }
    sectionAIState[cacheKey]=res.analysis||res.text||JSON.stringify(res,null,2);
    out.textContent=sectionAIState[cacheKey];
  }catch(e){out.textContent=localHodoInsight(scope,context,sectionData)+'\n\nAI 暫時失敗：'+e.message}
}
function restoreSectionAI(){
  document.querySelectorAll('.ai-out').forEach(out=>{
    const id=out.id;
    const match=Object.keys(sectionAIState).find(key=>key.startsWith(currentFilterKey()+'|'+id+'|'));
    if(match){out.style.display='block';out.textContent=sectionAIState[match]}
  });
}
function localHodoInsight(scope,ctx,data){
  const roas=ctx.roas.toFixed(2);
  if(scope==='health')return `整體禾多資料 ROAS 約 ${roas}，但資料來源為廠商周報加人工整理，應先處理 Unknown、Missing Name 與 Total Row。建議要求廠商固定提供：品牌、平台、活動名稱、廣告類型、週期、花費、營收、購買次數。`;
  if(scope==='trend')return `整體禾多 ROAS 約 ${roas}。請優先觀察花費增加時 ROAS 是否同步提升；若某週花費上升但 ROAS 下滑，通常代表預算流向低轉換活動或受眾疲乏。`;
  if(scope==='source')return `整體禾多 ROAS 約 ${roas}。平台分布應同時看花費與營收，不能只看點擊。若 Meta 點擊高但營收低，需檢查目錄商品、受眾與落地頁。`;
  return `整體禾多 ROAS 約 ${roas}。排行應用來決定加碼與停損：高 ROAS 且花費仍低的項目可加碼測試，低 ROAS 高花費項目需檢查素材、受眾或活動承接。`;
}
function hodoHealth(rows){
  const total=rows.length;
  const unknownPlatform=rows.filter(r=>r.platform==='Unknown').length;
  const unknownBrand=rows.filter(r=>r.brand==='Unknown').length;
  const missingName=rows.filter(r=>r.tags.includes('Missing Name')).length;
  const totalRows=rows.filter(r=>r.tags.includes('Total Row')).length;
  const clean=rows.filter(r=>r.tags.length===1&&r.tags[0]==='Clean').length;
  return {total,clean,unknownPlatform,unknownBrand,missingName,totalRows,cleanRate:clean/Math.max(total,1)};
}
function renderHodo(){
  const rows=cleanHodoRows();
  const health=hodoHealth(rows);
  const src=rows.filter(r=>r.spend>0||r.revenue>0).sort((a,b)=>b.roas-a.roas);
  const byRange=groupClean(rows,'dateRange',['spend','revenue','clicks','impressions']).map(x=>({...x,roas:x.revenue/Math.max(x.spend,1)}));
  const byPlatform=groupClean(rows,'platform',['spend','revenue','clicks','impressions']).map(x=>({...x,roas:x.revenue/Math.max(x.spend,1)})).sort((a,b)=>b.revenue-a.revenue);
  const vendor=parseVendorSummary();
  const review=rows.filter(r=>r.tags[0]!=='Clean').slice(0,12);
  document.getElementById('panel-hodo').innerHTML=`
    <div class="hero"><div><h1>SST&amp;C 禾多廣告數據戰情室</h1><p>廠商周報清洗、廣告成效、資料健康檢查與 AI 診斷</p></div><div class="note">來源：Manual Excel + Hodo Vendor Report<br>最後更新：${raw?.generatedAt||''}</div></div>
    ${kpis([{label:'曝光',value:fmtInt(rows.reduce((a,r)=>a+r.impressions,0))},{label:'CTR',value:fmtPct(rows.reduce((a,r)=>a+r.clicks,0)/Math.max(rows.reduce((a,r)=>a+r.impressions,0),1))},{label:'CPC',value:fmtMoney(rows.reduce((a,r)=>a+r.spend,0)/Math.max(rows.reduce((a,r)=>a+r.clicks,0),1))},{label:'購買次數',value:fmtInt(rows.reduce((a,r)=>a+r.orders,0))},{label:'廣告花費',value:fmtMoney(rows.reduce((a,r)=>a+r.spend,0))},{label:'廣告營收',value:fmtMoney(rows.reduce((a,r)=>a+r.revenue,0))}])}
    <div class="card wide"><h2>資料健康檢查</h2>
      <div class="kpis">
        ${healthCard('清洗成功率',(health.cleanRate*100).toFixed(1)+'%','Clean rows / all rows')}
        ${healthCard('Unknown Platform',fmtInt(health.unknownPlatform),'需要平台判斷')}
        ${healthCard('Unknown Brand',fmtInt(health.unknownBrand),'需要品牌判斷')}
        ${healthCard('Missing Name',fmtInt(health.missingName),'缺活動/受眾/素材名稱')}
        ${healthCard('Total Row',fmtInt(health.totalRows),'匯入時需排除或標記')}
        ${healthCard('原始周報 Sheets',fmtInt(vendor.length),'天喜國際周報')}
      </div>
      <div class="note">禾多廠商報表會混合活動、受眾、週總表與備註，系統會先推斷平台/品牌/類型並標記需要人工檢查的資料。</div>
      ${aiBlock('ai-hodo-health','AI 分析資料健康','health')}
    </div>
    <div class="grid">
      <div class="card"><h2>每週花費與 ROAS 趨勢</h2><div class="chart-box"><canvas id="hodoTrend"></canvas></div>${aiBlock('ai-hodo-trend','AI 分析此趨勢','trend')}</div>
      <div class="card"><h2>平台營收分布</h2><div class="chart-box"><canvas id="hodoPie"></canvas></div>${aiBlock('ai-hodo-source','AI 分析平台分布','source')}</div>
      <div class="card wide"><h2>清洗後廣告成效排行</h2>${table(src,[['名稱','name'],['平台','platform'],['類型','adType'],['曝光','impressions',fmtInt],['點擊','clicks',fmtInt],['花費','spend',fmtMoney],['營收','revenue',fmtMoney],['ROAS','roas',v=>v.toFixed(2)]],15)}${aiBlock('ai-hodo-ranking','AI 分析成效排行','ranking')}</div>
      <div class="card"><h2>原始周報解析摘要</h2>${table(vendor,[['Sheet','sheet'],['品牌','brand'],['週期','period'],['資料列','dataRows',fmtInt],['總計列','totalRows',fmtInt],['備註','notes',fmtInt]],12)}</div>
      <div class="card"><h2>需人工檢查清單</h2>${table(review,[['名稱','name'],['品牌','brand'],['平台','platform'],['類型','adType'],['標籤','tags',v=>Array.isArray(v)?v.join(', '):v]],12)}</div>
    </div>`;
  chart('hodoTrend','bar',byRange.map(x=>x.name||'未標日期'),[{label:'花費',data:byRange.map(x=>x.spend),backgroundColor:'#333'},{type:'line',label:'ROAS',data:byRange.map(x=>x.roas),borderColor:'#b3902c',yAxisID:'y1'}],{scales:{y1:{position:'right'}}});
  chart('hodoPie','doughnut',byPlatform.map(x=>x.name),[{data:byPlatform.map(x=>x.revenue),backgroundColor:palette()}]);
  restoreSectionAI();
}
function palette(){return ['#b3902c','#d0b05a','#e0ca89','#8b7b55','#383530','#c8b985','#a6893e','#eee3c2','#6d6041','#f3d66a']}
init();
</script>
